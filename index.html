<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwoleSensors Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-anim"></div>
<div class="background-glow"></div>

<div class="dashboard-wrapper">
    <header class="dashboard-header">
        <h1>Swole<span>Sensors</span></h1>
        <p>Kinematic Telemetry Dashboard</p>
    </header>

    <main class="dashboard-container">

        <!--  Controls  -->
        <div class="controls glass-panel">

            <div class="control-group">
                <label for="userSelect">User</label>
                <div class="select-wrapper">
                    <select id="userSelect">
                        <option value="">Loading…</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="weekSelect">Timeline</label>
                <div class="select-wrapper">
                    <select id="weekSelect">
                        <option value="">Loading…</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="workoutSelect">Movement</label>
                <div class="select-wrapper">
                    <select id="workoutSelect">
                        <option value="">Loading…</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="setSelect">Set</label>
                <div class="select-wrapper">
                    <select id="setSelect">
                        <option value="">Loading…</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="measurementSelect">Measurement</label>
                <div class="select-wrapper">
                    <select id="measurementSelect">
                        <option value="vertical_accel">Vertical Acceleration</option>
                        <option value="vertical_accel_medium">Vertical Acceleration (Medium Smoothing)</option>
                        <option value="vertical_accel_light">Vertical Acceleration (Light Smoothing)</option>
                        <option value="velocity_y">Vertical Velocity</option>
                    </select>
                </div>
            </div>

            <div class="control-group button-group">
                <button id="loadDataBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    Visualize
                </button>

                <!-- Upload button -->
                <label class="upload-btn" for="uploadInput" title="Upload a session CSV to unlock data">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload Session
                </label>
                <input type="file" id="uploadInput" accept=".csv" style="display:none">
            </div>

        </div><!-- /.controls -->

        <!-- Error display for wrong Upload -->
        <div id="errorDisplay" class="error-message glass-panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="errorText">Loading dataset…</span>
        </div>

        <!-- Feedbakc System  -->
        <div id="insightDisplay" class="insight-message glass-panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="8"></line>
                <line x1="12" y1="12" x2="12" y2="16"></line>
            </svg>
            <span id="insightText"></span>
        </div>

        <!-- Chart  -->
        <div class="chart-wrapper glass-panel">
            <canvas id="workoutChart"></canvas>
        </div>

    </main>
</div>

<script src="app.js"></script>
</body>
</html>
